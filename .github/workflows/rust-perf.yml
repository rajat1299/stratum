name: Rust Perf

on:
  workflow_dispatch:
  schedule:
    - cron: "23 8 * * 1"

permissions:
  contents: read

jobs:
  perf:
    name: Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --locked --release --test perf -- --nocapture
      - run: cargo test --locked --release --test perf_comparison -- --nocapture
