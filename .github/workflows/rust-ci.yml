name: Rust CI

on:
  pull_request:
  push:
    branches:
      - main
      - "v2/**"

permissions:
  contents: read

env:
  CARGO_AUDIT_VERSION: "0.22.1"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
          components: clippy
      - run: cargo clippy --locked --all-targets -- -D warnings

  postgres-migrations:
    name: Postgres Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: stratum_test
          POSTGRES_USER: stratum
          POSTGRES_PASSWORD: stratum
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stratum -d stratum_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y postgresql-client
      - name: Check Postgres migrations
        run: ./scripts/check-postgres-migrations.sh
        env:
          STRATUM_POSTGRES_MIGRATIONS_REQUIRED: "1"
          STRATUM_POSTGRES_TEST_URL: postgresql://stratum@localhost:5432/stratum_test
          PGPASSWORD: stratum

  postgres-backend:
    name: Postgres Backend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: stratum_test
          POSTGRES_USER: stratum
          POSTGRES_PASSWORD: stratum
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stratum -d stratum_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
          components: clippy
      - run: cargo clippy --locked --features postgres --all-targets -- -D warnings
        env:
          STRATUM_POSTGRES_TEST_REQUIRED: "1"
          STRATUM_POSTGRES_TEST_URL: postgresql://stratum@localhost:5432/stratum_test
          STRATUM_POSTGRES_TEST_PASSWORD: stratum
      - run: cargo test --locked --features postgres backend::postgres -- --nocapture
        env:
          STRATUM_POSTGRES_TEST_REQUIRED: "1"
          STRATUM_POSTGRES_TEST_URL: postgresql://stratum@localhost:5432/stratum_test
          STRATUM_POSTGRES_TEST_PASSWORD: stratum

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
      - run: cargo test --locked --lib --bins
      - run: cargo test --locked --test integration --test permissions
      - run: cargo test --locked --doc

  fuser:
    name: Optional FUSE Compile
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
      - run: cargo check --locked --features fuser --bin stratum-mount

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
      - run: cargo install cargo-audit --locked --version "$CARGO_AUDIT_VERSION"
      - run: cargo audit --deny warnings
