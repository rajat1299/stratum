name: Rust CI

on:
  pull_request:
  push:
    branches:
      - main
      - "v2/**"
  workflow_dispatch:
  schedule:
    - cron: "17 8 * * *"

permissions:
  contents: read

env:
  CARGO_AUDIT_VERSION: "0.22.1"

jobs:
  live-gates-summary:
    name: Live Gates Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Summarize live gate policy
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_PROTECTED: ${{ github.ref_protected }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            status="skipped"
            reason="pull_request runs do not use live secrets"
          elif [ "$EVENT_NAME" = "schedule" ] || [ "$REF_PROTECTED" = "true" ]; then
            status="required"
            reason="protected, scheduled, or manual live context"
          else
            status="skipped"
            reason="not a scheduled run or protected-ref context"
          fi

          {
            echo "## Live Gates"
            echo
            echo "| Gate | Status | Reason |"
            echo "| --- | --- | --- |"
            echo "| Postgres | ${status} | ${reason} |"
            echo "| R2 | ${status} | ${reason} |"
          } >> "$GITHUB_STEP_SUMMARY"

  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
          components: clippy
      - run: cargo clippy --locked --all-targets -- -D warnings

  postgres-migrations:
    name: Postgres Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: stratum_test
          POSTGRES_USER: stratum
          POSTGRES_PASSWORD: stratum
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stratum -d stratum_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y postgresql-client
      - name: Check Postgres migrations
        run: ./scripts/check-postgres-migrations.sh
        env:
          STRATUM_POSTGRES_MIGRATIONS_REQUIRED: "1"
          STRATUM_POSTGRES_TEST_URL: postgresql://stratum@localhost:5432/stratum_test
          PGPASSWORD: stratum

  postgres-backend:
    name: Postgres Backend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: stratum_test
          POSTGRES_USER: stratum
          POSTGRES_PASSWORD: stratum
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stratum -d stratum_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
          components: clippy
      - run: cargo clippy --locked --features postgres --all-targets -- -D warnings
        env:
          STRATUM_POSTGRES_TEST_REQUIRED: "1"
          STRATUM_POSTGRES_TEST_URL: postgresql://stratum@localhost:5432/stratum_test
          STRATUM_POSTGRES_TEST_PASSWORD: stratum
      - run: cargo test --locked --features postgres backend::postgres -- --test-threads=1 --nocapture
        env:
          STRATUM_POSTGRES_TEST_REQUIRED: "1"
          STRATUM_POSTGRES_TEST_URL: postgresql://stratum@localhost:5432/stratum_test
          STRATUM_POSTGRES_TEST_PASSWORD: stratum

  r2-object-store:
    name: R2 Object Store Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
      - name: Check R2 gate script syntax
        run: bash -n scripts/check-r2-object-store.sh
      - name: Check R2 object-store gate
        run: ./scripts/check-r2-object-store.sh

  live-postgres:
    name: Live Postgres Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event_name != 'pull_request' && (github.event_name == 'schedule' || github.ref_protected == true) }}
    environment: live-gates

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y postgresql-client
      - name: Check live Postgres script syntax
        run: |
          for script in scripts/check-postgres-migrations.sh scripts/ci-live-postgres-gate.sh; do
            bash -n "$script"
          done
      - name: Run live Postgres gate
        run: ./scripts/ci-live-postgres-gate.sh
        env:
          STRATUM_LIVE_GATE_REQUIRED: "1"
          STRATUM_POSTGRES_TEST_URL: ${{ secrets.STRATUM_POSTGRES_TEST_URL }}
          STRATUM_POSTGRES_TEST_PASSWORD: ${{ secrets.STRATUM_POSTGRES_TEST_PASSWORD }}
          PGPASSWORD: ${{ secrets.STRATUM_POSTGRES_TEST_PASSWORD }}

  live-r2:
    name: Live R2 Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ github.event_name != 'pull_request' && (github.event_name == 'schedule' || github.ref_protected == true) }}
    environment: live-gates

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
      - name: Check live R2 script syntax
        run: |
          for script in scripts/check-r2-object-store.sh scripts/ci-live-r2-gate.sh; do
            bash -n "$script"
          done
      - name: Run live R2 gate
        run: ./scripts/ci-live-r2-gate.sh
        env:
          STRATUM_LIVE_GATE_REQUIRED: "1"
          STRATUM_R2_BUCKET: ${{ secrets.STRATUM_R2_BUCKET }}
          STRATUM_R2_ENDPOINT: ${{ secrets.STRATUM_R2_ENDPOINT }}
          STRATUM_R2_ACCESS_KEY_ID: ${{ secrets.STRATUM_R2_ACCESS_KEY_ID }}
          STRATUM_R2_SECRET_ACCESS_KEY: ${{ secrets.STRATUM_R2_SECRET_ACCESS_KEY }}
          STRATUM_R2_REGION: ${{ secrets.STRATUM_R2_REGION }}
          STRATUM_R2_PREFIX: ${{ secrets.STRATUM_R2_PREFIX }}
          STRATUM_R2_REQUEST_TIMEOUT_MS: ${{ secrets.STRATUM_R2_REQUEST_TIMEOUT_MS }}
          STRATUM_R2_CONNECT_TIMEOUT_MS: ${{ secrets.STRATUM_R2_CONNECT_TIMEOUT_MS }}
          STRATUM_R2_MAX_ATTEMPTS: ${{ secrets.STRATUM_R2_MAX_ATTEMPTS }}
          STRATUM_R2_RETRY_BASE_DELAY_MS: ${{ secrets.STRATUM_R2_RETRY_BASE_DELAY_MS }}
          STRATUM_R2_RETRY_MAX_DELAY_MS: ${{ secrets.STRATUM_R2_RETRY_MAX_DELAY_MS }}

  typescript-sdk:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "1.2.19"
      - name: Install SDK dependencies
        run: bun install --frozen-lockfile
        working-directory: sdk
      - name: Typecheck TypeScript SDK
        run: bun run --cwd typescript typecheck
        working-directory: sdk
      - name: Test TypeScript SDK
        run: bun run --cwd typescript test:run
        working-directory: sdk
      - name: Build TypeScript SDK dist
        run: bun run --cwd typescript build
        working-directory: sdk
      - name: Verify TypeScript SDK package boundary
        run: npm pack --dry-run
        working-directory: sdk/typescript

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
      - run: cargo test --locked --lib --bins
      - run: cargo test --locked --test integration --test permissions
      - run: cargo test --locked --doc

  fuser:
    name: Optional FUSE Compile
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
      - run: cargo check --locked --features fuser --bin stratum-mount

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
      - run: cargo install cargo-audit --locked --version "$CARGO_AUDIT_VERSION"
      - run: cargo audit --deny warnings
